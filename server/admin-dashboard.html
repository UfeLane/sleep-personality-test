<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>眠格数据看板 — Sleep Personality Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#1d1d1f;font-size:14px;line-height:1.5}
.app{max-width:1440px;margin:0 auto;padding:24px 32px 48px}
.login-wrapper{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)}
.login-card{background:#fff;border-radius:20px;padding:48px 40px;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.login-card h1{font-size:28px;font-weight:700;margin-bottom:4px;background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-card .subtitle{color:#8e8ea0;font-size:14px;margin-bottom:32px}
.login-card .field{margin-bottom:20px}
.login-card .field label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:6px}
.login-card .field input{width:100%;padding:11px 14px;border:1.5px solid #e5e5ea;border-radius:10px;font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s}
.login-card .field input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.login-btn{width:100%;padding:12px;margin-top:8px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s,transform .15s}
.login-btn:hover{opacity:.92;transform:translateY(-1px)}
.login-btn:active{transform:translateY(0)}
.login-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.login-error{color:#ef4444;font-size:13px;margin-top:12px;text-align:center}
.dashboard{display:none}.dashboard.active{display:block}
.dash-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid #e8e8ec}
.dash-header .title-group{display:flex;align-items:center;gap:16px}
.dash-header h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.dash-header .source-badge{font-size:12px;color:#8e8ea0;background:#f5f5f7;padding:4px 12px;border-radius:6px;max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.header-actions{display:flex;align-items:center;gap:10px}
.btn-outline{padding:8px 18px;border:1.5px solid #d4d4d8;border-radius:8px;background:#fff;font-size:13px;font-weight:500;color:#555;cursor:pointer;transition:all .2s}
.btn-outline:hover{background:#f5f5f7;border-color:#a1a1aa}
.btn-ghost{padding:8px 16px;border:none;border-radius:8px;background:transparent;font-size:13px;color:#ef4444;cursor:pointer;transition:background .2s}
.btn-ghost:hover{background:#fef2f2}
.btn-primary{padding:8px 20px;border:none;border-radius:8px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn-primary:hover{opacity:.9}.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.last-update{font-size:12px;color:#a1a1aa}
.stats-row{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:12px;padding:18px 16px;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid #f0f0f2;transition:box-shadow .2s,transform .15s}
.stat-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.06);transform:translateY(-2px)}
.stat-card .stat-num{font-size:28px;font-weight:700;color:#6366f1;line-height:1.2}
.stat-card .stat-label{font-size:12px;color:#8e8ea0;margin-top:4px}
.stat-card .stat-sub{font-size:11px;color:#a1a1aa;margin-top:2px}
.stat-card.trend-up .stat-num{color:#22c55e}
.stat-card.trend-warn .stat-num{color:#f59e0b}
.filter-bar{display:flex;align-items:center;gap:12px;margin-bottom:24px;background:#fff;border-radius:12px;padding:12px 20px;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid #f0f0f2;flex-wrap:wrap}
.filter-bar .filter-label{font-size:12px;font-weight:600;color:#555;margin-right:4px}
.filter-btn-group{display:flex;gap:4px}
.filter-btn{padding:5px 14px;border:1px solid #e5e5ea;border-radius:6px;background:#fff;font-size:12px;color:#666;cursor:pointer;transition:all .2s}
.filter-btn:hover{border-color:#c7c7d1}
.filter-btn.active{background:#6366f1;color:#fff;border-color:#6366f1}
.filter-spacer{flex:1}
.filter-bar .right-group{display:flex;align-items:center;gap:10px}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.chart-card{background:#fff;border-radius:14px;padding:24px;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid #f0f0f2}
.chart-card.full{grid-column:1/-1}
.chart-card .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.chart-card .card-title{font-size:15px;font-weight:600;color:#333;display:flex;align-items:center;gap:8px}
.chart-card .card-badge{font-size:11px;color:#8e8ea0;background:#f5f5f7;padding:2px 8px;border-radius:4px}
.chart-wrapper{position:relative;width:100%}
.chart-wrapper canvas{width:100%!important}
.chart-sm canvas{max-height:260px}
.chart-md canvas{max-height:300px}
.chart-lg canvas{max-height:340px}
.metric-row{display:flex;gap:24px;margin-bottom:16px;flex-wrap:wrap}
.metric-item{text-align:center;min-width:80px}
.metric-item .val{font-size:20px;font-weight:700;color:#333}
.metric-item .lbl{font-size:11px;color:#a1a1aa;margin-top:2px}
.table-card{background:#fff;border-radius:14px;padding:24px;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid #f0f0f2;margin-bottom:24px}
.table-card .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.table-card .card-title{font-size:15px;font-weight:600;color:#333;display:flex;align-items:center;gap:8px}
.table-card .record-count{font-size:12px;color:#a1a1aa}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 14px;background:#fafafa;font-weight:600;color:#555;border-bottom:2px solid #e8e8ec;font-size:12px;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{background:#f0f0f2}
td{padding:10px 14px;border-bottom:1px solid #f2f2f5;color:#444;font-size:13px}
tr:hover td{background:#fafafa}
.persona-badge{display:inline-block;padding:2px 10px;border-radius:6px;font-size:12px;font-weight:500}
.tag-pill{display:inline-block;padding:1px 8px;border-radius:4px;font-size:11px;color:#6366f1;background:rgba(99,102,241,.08);margin:1px 2px}
.empty-state{text-align:center;padding:48px 0;color:#a1a1aa;font-size:14px}
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,.75);z-index:999;align-items:center;justify-content:center}
.loading-overlay.active{display:flex}
.loading-spinner{width:40px;height:40px;border:3px solid #e5e5ea;border-top-color:#6366f1;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:1200px){.stats-row{grid-template-columns:repeat(3,1fr)}}
@media(max-width:768px){.app{padding:16px}.stats-row{grid-template-columns:repeat(2,1fr)}.charts-grid{grid-template-columns:1fr}.chart-card.full{grid-column:1}.dash-header{flex-direction:column;align-items:flex-start;gap:12px}.login-card{padding:32px 24px}}
.fade-in{animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.compact-stats{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.compact-stat{text-align:center;padding:8px 16px;background:#f9f9fb;border-radius:8px;flex:1;min-width:100px}
.compact-stat .num{font-size:22px;font-weight:700;color:#333}
.compact-stat .lbl{font-size:11px;color:#8e8ea0;margin-top:2px}
.compact-stat .trend{font-size:11px;margin-top:2px}
.trend-up{color:#22c55e}.trend-down{color:#ef4444}
.persona-legend{display:flex;flex-wrap:wrap;gap:8px 16px;margin-top:12px}
.persona-legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#555}
.persona-legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.data-scroll{max-height:480px;overflow-y:auto}
.data-scroll::-webkit-scrollbar{width:6px}
.data-scroll::-webkit-scrollbar-track{background:transparent}
.data-scroll::-webkit-scrollbar-thumb{background:#d4d4d8;border-radius:3px}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div></div>

<!-- Login -->
<div class="login-wrapper" id="loginView">
  <div class="login-card fade-in">
    <h1>🌙 眠格数据看板</h1>
    <p class="subtitle">Sleep Personality Admin Dashboard</p>
    <div class="field">
      <label>管理 Token</label>
      <input id="apiToken" type="password" placeholder="输入 admin token" value="admin123"
             onkeydown="if(event.key==='Enter') loadData()">
    </div>
    <button class="login-btn" id="loginBtn" onclick="loadData()">查看数据</button>
    <div id="loginError" class="login-error"></div>
  </div>
</div>

<!-- Dashboard -->
<div class="dashboard app" id="dashView">
  <div class="dash-header fade-in">
    <div class="title-group">
      <h1>🌙 眠格数据看板</h1>
      <span class="source-badge" id="dataSource">同源服务</span>
      <span class="last-update" id="lastUpdate"></span>
    </div>
    <div class="header-actions">
      <button class="btn-outline" onclick="exportCSV()">📥 导出 CSV</button>
      <button class="btn-primary" onclick="refreshData()">⟳ 刷新</button>
      <button class="btn-ghost" onclick="showLogin()">断开</button>
    </div>
  </div>

  <div class="stats-row fade-in" id="statsRow"></div>

  <div class="filter-bar fade-in">
    <span class="filter-label">📅 时间范围</span>
    <div class="filter-btn-group">
      <button class="filter-btn" data-range="7" onclick="setDateRange(7)">近 7 天</button>
      <button class="filter-btn active" data-range="30" onclick="setDateRange(30)">近 30 天</button>
      <button class="filter-btn" data-range="90" onclick="setDateRange(90)">近 90 天</button>
      <button class="filter-btn" data-range="0" onclick="setDateRange(0)">全部</button>
    </div>
    <div class="filter-spacer"></div>
    <div class="right-group">
      <span class="filter-label">🧠 人格筛选</span>
      <select id="personaFilter" onchange="applyFilters()" style="padding:5px 10px;border:1px solid #e5e5ea;border-radius:6px;font-size:12px;color:#555;outline:none;background:#fff">
        <option value="all">全部人格</option>
        <option value="P01">卧床空想家</option>
        <option value="P02">夜半断线玩家</option>
        <option value="P03">拂晓强制开机人</option>
        <option value="P04">全天续航透支者</option>
        <option value="P05">深夜自留夜猫客</option>
        <option value="P06">天赋安睡收藏家</option>
      </select>
    </div>
  </div>

  <div class="charts-grid fade-in">
    <div class="chart-card chart-md">
      <div class="card-header"><span class="card-title">🧠 人格分布</span><span class="card-badge">占比</span></div>
      <div class="chart-wrapper"><canvas id="personaChart"></canvas></div>
      <div class="persona-legend" id="personaLegend"></div>
    </div>
    <div class="chart-card chart-md">
      <div class="card-header"><span class="card-title">📊 PSQI 分数分布</span><span class="card-badge">得分越高睡眠质量越差</span></div>
      <div class="compact-stats" id="psqiStats"></div>
      <div class="chart-wrapper"><canvas id="psqiChart"></canvas></div>
    </div>
    <div class="chart-card chart-md">
      <div class="card-header"><span class="card-title">📈 测试量趋势</span><span class="card-badge" id="trendBadge">近30天</span></div>
      <div class="metric-row" id="volumeMetrics"></div>
      <div class="chart-wrapper chart-lg"><canvas id="trendChart"></canvas></div>
    </div>
    <div class="chart-card chart-md">
      <div class="card-header"><span class="card-title">🏷️ 标签频率 Top 10</span><span class="card-badge">用户自选标签</span></div>
      <div class="chart-wrapper"><canvas id="tagChart"></canvas></div>
    </div>
    <div class="chart-card full chart-sm">
      <div class="card-header"><span class="card-title">📊 睡眠质量等级分布</span><span class="card-badge">PSQI 综合评级</span></div>
      <div class="compact-stats" id="levelStats"></div>
      <div class="chart-wrapper"><canvas id="levelChart"></canvas></div>
    </div>
    <div class="chart-card full chart-sm">
      <div class="card-header"><span class="card-title">📋 PSQI 分段统计</span><span class="card-badge">分数区间分布</span></div>
      <div class="chart-wrapper"><canvas id="rangeChart"></canvas></div>
    </div>
  </div>

  <div class="table-card fade-in">
    <div class="card-header"><span class="card-title">📋 原始数据</span><span class="record-count" id="recordCount">共 0 条记录</span></div>
    <div class="table-wrap">
      <div class="data-scroll" id="dataScroll">
        <table>
          <thead><tr>
            <th onclick="sortTable('date')">日期 ↕</th>
            <th onclick="sortTable('primary_persona')">人格 ↕</th>
            <th onclick="sortTable('secondary_persona')">辅人格 ↕</th>
            <th onclick="sortTable('psqi_total')">PSQI ↕</th>
            <th onclick="sortTable('level')">等级 ↕</th>
            <th>标签</th>
          </tr></thead>
          <tbody id="dataTable"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const PERSONA_NAMES={P01:'卧床空想家',P02:'夜半断线玩家',P03:'拂晓强制开机人',P04:'全天续航透支者',P05:'深夜自留夜猫客',P06:'天赋安睡收藏家'}
const PERSONA_COLORS={P01:'#a78bfa',P02:'#60a5fa',P03:'#fbbf24',P04:'#f87171',P05:'#34d399',P06:'#818cf8'}
const LEVEL_COLORS={'优秀':'#22c55e','良好':'#3b82f6','轻度':'#fbbf24','中度':'#fb923c','重度':'#ef4444','严重':'#b91c1c','睡眠健康':'#22c55e','轻度关注':'#fbbf24','中度关注':'#fb923c','重度关注':'#ef4444'}
function getLevelColor(l){return LEVEL_COLORS[l]||'#818cf8'}
function getLevelOrder(levels){const P=['优秀','良好','睡眠健康','轻度','轻度关注','中度','中度关注','重度','重度关注','严重'];return Object.keys(levels).sort((a,b)=>{const ia=P.indexOf(a),ib=P.indexOf(b);return(ia===-1?999:ia)-(ib===-1?999:ib)})}
let rawData=null,charts={},dateRange=30,sortKey=null,sortAsc=true
Chart.defaults.font.family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
Chart.defaults.font.size=12;Chart.defaults.color='#8e8ea0'

function showLogin(){document.getElementById('loginView').style.display='flex';document.getElementById('dashView').classList.remove('active');Object.values(charts).forEach(c=>{if(c)c.destroy()});charts={};rawData=null}

async function loadData(){
  const token=document.getElementById('apiToken').value.trim()
  const errEl=document.getElementById('loginError');const btn=document.getElementById('loginBtn')
  errEl.textContent=''
  if(!token){errEl.textContent='请输入管理 Token';return}
  btn.disabled=true;btn.textContent='加载中...'
  try{
    const r=await fetch('/api/collect/data?token='+encodeURIComponent(token))
    const j=await r.json()
    if(!j.success){errEl.textContent=j.error||'加载失败';btn.disabled=false;btn.textContent='查看数据';return}
    document.getElementById('loginView').style.display='none'
    document.getElementById('dashView').classList.add('active')
    document.getElementById('dataSource').textContent='🚀 '+window.location.hostname
    rawData=j.data;renderDashboard()
  }catch(e){errEl.textContent='连接失败: '+e.message}
  btn.disabled=false;btn.textContent='查看数据'
}

async function refreshData(){if(!rawData)return;showLoading(true);try{const r=await fetch('/api/collect/data?token='+encodeURIComponent(document.getElementById('apiToken').value||'admin123'));const j=await r.json();if(j.success){rawData=j.data;renderDashboard()}}catch(e){alert('刷新失败: '+e.message)}showLoading(false)}
function showLoading(s){document.getElementById('loadingOverlay').classList.toggle('active',s)}
function setDateRange(d){dateRange=d;document.querySelectorAll('.filter-btn[data-range]').forEach(b=>{b.classList.toggle('active',parseInt(b.dataset.range)===d)});applyFilters()}
let selectedPersona='all'
function applyFilters(){selectedPersona=document.getElementById('personaFilter').value;renderDashboard()}

function getFilteredData(){
  if(!rawData)return null
  let records=rawData.records||[]
  if(dateRange>0){const c=new Date();c.setDate(c.getDate()-dateRange);const cs=c.toISOString().split('T')[0];records=records.filter(r=>r.date>=cs)}
  if(selectedPersona!=='all')records=records.filter(r=>r.primary_persona===selectedPersona||r.secondary_persona===selectedPersona)
  return{...rawData,records}
}

function computeStats(records){
  const t=records.length,v=records.map(r=>r.psqi_total),a=t>0?v.reduce((a,b)=>a+b,0)/t:0
  const p={},l={},tc={},dc={},sc={},pb={'0-5':0,'6-10':0,'11-15':0,'16-21':0},pr={}
  for(let i=0;i<=21;i++)pr[i]=0
  for(const r of records){
    p[r.primary_persona]=(p[r.primary_persona]||0)+1
    if(r.secondary_persona){p[r.secondary_persona]=(p[r.secondary_persona]||0)+1;sc[r.secondary_persona]=(sc[r.secondary_persona]||0)+1}
    l[r.level]=(l[r.level]||0)+1
    if(Array.isArray(r.tags))r.tags.forEach(tg=>{tc[tg]=(tc[tg]||0)+1})
    dc[r.date]=(dc[r.date]||0)+1
    const val=r.psqi_total
    if(val<=5)pb['0-5']++;else if(val<=10)pb['6-10']++;else if(val<=15)pb['11-15']++;else pb['16-21']++
    pr[val]=(pr[val]||0)+1
  }
  const td=new Date().toISOString().split('T')[0]
  return{total:t,avgPsqi:a,personaMap:p,levelMap:l,tagCount:tc,dailyMap:dc,secondaryCount:sc,psqiBuckets:pb,psqiRanges:pr,todayCount:dc[td]||0,personaTypes:Object.keys(p).length,withSecondary:records.filter(r=>r.secondary_persona).length,psqiValues:v}
}

function renderDashboard(){
  const d=getFilteredData();if(!d)return
  const s=computeStats(d.records)
  document.getElementById('lastUpdate').textContent='更新时间: '+new Date().toLocaleString('zh-CN')
  document.getElementById('recordCount').textContent='共 '+s.total+' 条记录'
  renderStats(s);renderPersonaChart(s);renderPsqiChart(s);renderTrendChart(s);renderTagChart(s);renderLevelChart(s);renderRangeChart(s);renderTable(d.records)
}

function renderStats(s){
  const mn=s.psqiValues.length?Math.min(...s.psqiValues):0,mx=s.psqiValues.length?Math.max(...s.psqiValues):0
  document.getElementById('statsRow').innerHTML=
    `<div class="stat-card"><div class="stat-num">${s.total}</div><div class="stat-label">总记录数</div><div class="stat-sub">累计测试人次</div></div>`+
    `<div class="stat-card ${s.avgPsqi>10?'trend-warn':''}"><div class="stat-num">${s.avgPsqi.toFixed(1)}</div><div class="stat-label">平均 PSQI</div><div class="stat-sub">${mn} – ${mx} 范围</div></div>`+
    `<div class="stat-card ${s.todayCount>0?'trend-up':''}"><div class="stat-num">${s.todayCount}</div><div class="stat-label">今日测试</div><div class="stat-sub">${s.todayCount>0?'今日有新增数据':'今日暂无数据'}</div></div>`+
    `<div class="stat-card"><div class="stat-num">${s.personaTypes}</div><div class="stat-label">人格类型</div><div class="stat-sub">6 种人格类型</div></div>`+
    `<div class="stat-card"><div class="stat-num">${s.withSecondary}</div><div class="stat-label">含辅人格</div><div class="stat-sub">占总记录 ${s.total>0?(s.withSecondary/s.total*100).toFixed(1):0}%</div></div>`+
    `<div class="stat-card"><div class="stat-num">${s.total>0?(s.withSecondary/s.total*100).toFixed(0):0}%</div><div class="stat-label">辅人格占比</div><div class="stat-sub">${s.total-s.withSecondary} 条仅主人格</div></div>`
}

function renderPersonaChart(s){
  const so=Object.entries(s.personaMap).sort((a,b)=>b[1]-a[1])
  document.getElementById('personaLegend').innerHTML=so.map(([k,v])=>`<span class="persona-legend-item"><span class="persona-legend-dot" style="background:${PERSONA_COLORS[k]||'#6366f1'}"></span>${PERSONA_NAMES[k]||k} <strong>${v}</strong> (${s.total>0?(v/s.total*100).toFixed(1):0}%)</span>`).join('')
  if(charts.persona)charts.persona.destroy()
  const ctx=document.getElementById('personaChart').getContext('2d')
  charts.persona=new Chart(ctx,{type:'doughnut',data:{labels:so.map(([k])=>PERSONA_NAMES[k]||k),datasets:[{data:so.map(([,v])=>v),backgroundColor:so.map(([k])=>PERSONA_COLORS[k]||'#6366f1'),borderWidth:2,borderColor:'#fff',hoverOffset:8}]},options:{responsive:true,maintainAspectRatio:true,cutout:'55%',plugins:{legend:{display:false},tooltip:{callbacks:{label:(ctx)=>{const t=ctx.dataset.data.reduce((a,b)=>a+b,0);return ctx.label+': '+ctx.parsed+' 人 ('+((ctx.parsed/t)*100).toFixed(1)+'%)'}}}}}})
}

function renderPsqiChart(s){
  const mn=s.psqiValues.length?Math.min(...s.psqiValues):0,mx=s.psqiValues.length?Math.max(...s.psqiValues):0
  document.getElementById('psqiStats').innerHTML=
    `<div class="compact-stat"><div class="num">${s.avgPsqi.toFixed(1)}</div><div class="lbl">平均分</div></div>`+
    `<div class="compact-stat"><div class="num">${mn}</div><div class="lbl">最低分</div></div>`+
    `<div class="compact-stat"><div class="num">${mx}</div><div class="lbl">最高分</div></div>`+
    `<div class="compact-stat"><div class="num">${s.psqiValues.filter(v=>v<=5).length}</div><div class="lbl">良好(≤5)</div></div>`+
    `<div class="compact-stat"><div class="num">${s.psqiValues.filter(v=>v>5&&v<=10).length}</div><div class="lbl">轻度(6-10)</div></div>`+
    `<div class="compact-stat"><div class="num">${s.psqiValues.filter(v=>v>10).length}</div><div class="lbl">中重度(>10)</div></div>`
  if(charts.psqi)charts.psqi.destroy()
  const ctx=document.getElementById('psqiChart').getContext('2d')
  charts.psqi=new Chart(ctx,{type:'bar',data:{labels:['0-5 (良好)','6-10 (轻度)','11-15 (中度)','16-21 (重度)'],datasets:[{label:'人数',data:[s.psqiBuckets['0-5'],s.psqiBuckets['6-10'],s.psqiBuckets['11-15'],s.psqiBuckets['16-21']],backgroundColor:['#22c55e','#fbbf24','#fb923c','#ef4444'],borderRadius:6,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1,precision:0}},x:{grid:{display:false}}}}})
}

function renderTrendChart(s){
  const so=Object.entries(s.dailyMap).sort((a,b)=>a[0].localeCompare(b[0])),ct=so.map(([,c])=>c),tp=ct.reduce((a,b)=>a+b,0)
  document.getElementById('volumeMetrics').innerHTML=
    `<div class="metric-item"><div class="val">${tp}</div><div class="lbl">期间总量</div></div>`+
    `<div class="metric-item"><div class="val">${so.length>0?(tp/so.length).toFixed(1):0}</div><div class="lbl">日均</div></div>`+
    `<div class="metric-item"><div class="val">${ct.length>0?Math.max(...ct):0}</div><div class="lbl">单日峰值</div></div>`+
    `<div class="metric-item"><div class="val">${so.length}</div><div class="lbl">活跃天数</div></div>`
  if(charts.trend)charts.trend.destroy()
  const ctx=document.getElementById('trendChart').getContext('2d'),grad=ctx.createLinearGradient(0,0,0,300)
  grad.addColorStop(0,'rgba(99,102,241,0.25)');grad.addColorStop(1,'rgba(99,102,241,0.01)')
  charts.trend=new Chart(ctx,{type:'line',data:{labels:so.map(d=>d[0].slice(5)),datasets:[{label:'完成数',data:ct,borderColor:'#6366f1',backgroundColor:grad,fill:true,tension:.35,pointRadius:3,pointBackgroundColor:'#6366f1',pointHoverRadius:6,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:true,interaction:{intersect:false,mode:'index'},plugins:{legend:{display:false},tooltip:{callbacks:{title:(i)=>i[0].label+' 日',label:(c)=>c.parsed.y+' 人完成测试'}}},scales:{y:{beginAtZero:true,ticks:{stepSize:1,precision:0}},x:{grid:{display:false},ticks:{maxTicksLimit:15,maxRotation:45}}}}})
}

function renderTagChart(s){
  const so=Object.entries(s.tagCount).sort((a,b)=>b[1]-a[1]).slice(0,10)
  if(charts.tag)charts.tag.destroy()
  const ctx=document.getElementById('tagChart').getContext('2d')
  if(!so.length){ctx.canvas.parentElement.innerHTML='<div class="empty-state">暂无标签数据</div>';return}
  charts.tag=new Chart(ctx,{type:'bar',data:{labels:so.map(([t])=>t).reverse(),datasets:[{label:'出现次数',data:so.map(([,v])=>v).reverse(),backgroundColor:'#a78bfa',borderRadius:4,borderSkipped:false}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:(c)=>c.parsed.x+' 次'}}},scales:{x:{beginAtZero:true,ticks:{stepSize:1,precision:0}},y:{grid:{display:false}}}}})
}

function renderLevelChart(s){
  const lo=getLevelOrder(s.levelMap),en=lo.map(l=>[l,s.levelMap[l]]),t=s.total
  document.getElementById('levelStats').innerHTML=en.map(([l,v])=>`<div class="compact-stat"><div class="num" style="color:${getLevelColor(l)}">${v}</div><div class="lbl">${l}</div><div class="trend">${t>0?(v/t*100).toFixed(1):0}%</div></div>`).join('')
  if(charts.level)charts.level.destroy()
  const ctx=document.getElementById('levelChart').getContext('2d')
  charts.level=new Chart(ctx,{type:'bar',data:{labels:en.map(([l])=>l),datasets:[{label:'人数',data:en.map(([,v])=>v),backgroundColor:en.map(([l])=>getLevelColor(l)),borderRadius:6,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:(ctx)=>{const p=t>0?(ctx.parsed.y/t*100).toFixed(1):0;return ctx.parsed.y+' 人 ('+p+'%)'}}}},scales:{y:{beginAtZero:true,ticks:{stepSize:1,precision:0}},x:{grid:{display:false}}}}})
}

function renderRangeChart(s){
  if(charts.range)charts.range.destroy()
  const ctx=document.getElementById('rangeChart').getContext('2d'),lb=Object.keys(s.psqiRanges).map(Number),vl=Object.values(s.psqiRanges),cl=lb.map(v=>v<=5?'#22c55e':v<=10?'#fbbf24':v<=15?'#fb923c':'#ef4444')
  charts.range=new Chart(ctx,{type:'bar',data:{labels:lb.map(v=>v.toString()),datasets:[{label:'人数',data:vl,backgroundColor:cl,borderRadius:2,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:(ctx)=>{const p=s.total>0?(ctx.parsed.y/s.total*100).toFixed(1):0;return ctx.parsed.y+' 人 ('+p+'%) · PSQI '+ctx.label+' 分'}}}},scales:{y:{beginAtZero:true,ticks:{stepSize:1,precision:0}},x:{grid:{display:false},ticks:{maxTicksLimit:22,maxRotation:0,font:{size:10}}}}}})
}

let currentRecords=[]
function renderTable(records){currentRecords=records;const tb=document.getElementById('dataTable');if(!records.length){tb.innerHTML='<tr><td colspan="6" class="empty-state">暂无数据</td></tr>';return}
  let s=[...records]
  if(sortKey){s.sort((a,b)=>{let va=a[sortKey]??'',vb=b[sortKey]??'';return typeof va==='number'?sortAsc?va-vb:vb-va:sortAsc?String(va).localeCompare(String(vb)):String(vb).localeCompare(String(va))})}
  tb.innerHTML=s.slice().reverse().map(r=>{const tags=Array.isArray(r.tags)?r.tags.map(t=>`<span class="tag-pill">${t}</span>`).join(''):'',sec=r.secondary_persona?PERSONA_NAMES[r.secondary_persona]||r.secondary_persona:'<span style="color:#ccc">—</span>',pc=PERSONA_COLORS[r.primary_persona]||'#6366f1'
  return `<tr><td style="white-space:nowrap">${r.date||'-'}</td><td><span class="persona-badge" style="background:${pc}18;color:${pc}">${PERSONA_NAMES[r.primary_persona]||r.primary_persona}</span></td><td style="color:${r.secondary_persona?'#666':'#ccc'}">${sec}</td><td style="font-weight:600;color:${r.psqi_total>10?'#ef4444':r.psqi_total>5?'#f59e0b':'#22c55e'}">${r.psqi_total}</td><td><span style="color:${getLevelColor(r.level)};font-weight:500">${r.level||'-'}</span></td><td style="max-width:200px">${tags||'<span style="color:#ccc">—</span>'}</td></tr>`}).join('')}

function sortTable(key){if(sortKey===key)sortAsc=!sortAsc;else{sortKey=key;sortAsc=true}renderTable(currentRecords)}

function exportCSV(){if(!currentRecords||!currentRecords.length){alert('暂无数据可导出');return}
  const h=['日期','主人格','主人格编码','辅人格','辅人格编码','PSQI','等级','标签']
  const r=currentRecords.map(r=>[r.date||'',PERSONA_NAMES[r.primary_persona]||r.primary_persona,r.primary_persona,r.secondary_persona?PERSONA_NAMES[r.secondary_persona]||r.secondary_persona:'',r.secondary_persona||'',r.psqi_total,r.level||'',Array.isArray(r.tags)?r.tags.join('; '):''])
  const csv=[h,...r].map(row=>row.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n')
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'})
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='眠格数据_'+(new Date().toISOString().split('T')[0])+'.csv';a.click();URL.revokeObjectURL(a.href)}
</script>
